name: Monorepo CI

# Trigger on push / PR when any tracked package changes. The
# `paths` filter keeps unrelated smart-contract commits from
# spinning up a Node + Redis job for no reason. The workflow
# file itself is included so changes to the CI config also
# trigger a re-run.
on:
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'zk-proofs/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'zk-proofs/**'
      - '.github/workflows/**'

# Cancel in-flight runs on the same ref so a force-push or rapid
# follow-up commit doesn't burn a second Redis container.
concurrency:
  group: monorepo-ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the GITHUB_TOKEN. Every job
# inherits `contents: read`; jobs that need to write (release,
# deploy, etc.) can opt into higher scopes locally. This is the
# GitHub-recommended pattern for public repos and is the hard
# requirement for restricting the default token scope under
# branch protection.
permissions:
  contents: read

jobs:
  test:
    name: jest (with Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Service container for the Redis-backed rate-limit integration
    # test (and any future tests that need Redis). GitHub will wait
    # for the healthcheck to pass before the job's `steps` run, so
    # `connectRedis()` in `beforeAll` won't race the container boot.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # `REDIS_HOST=127.0.0.1` resolves to the service container
      # above. `connectRedis()` in `src/config/redis.ts` reads
      # `process.env.REDIS_*` and falls back to those defaults.
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      # Dedicated test DB so a re-run (or a parallel matrix run)
      # can't trample on real data. The test file also re-asserts
      # this in its `beforeAll`; this env var is belt-and-braces.
      REDIS_DB: '15'
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Project requires `node >= 18.0.0` per
          # `backend/package.json#engines`. Pin to the current LTS.
          node-version: '20'

      - name: Install dependencies
        # `npm ci` is faster and reproducible; it will fail the
        # build if `package.json` and `package-lock.json` drift
        # apart, so dependency drift is caught at CI time.
        run: npm ci

      - name: Run tests
        # `npm test` -> `jest` (per package.json). The rate-limit
        # integration test in `src/__tests__/rateLimit.test.ts`
        # uses `process.env.REDIS_DB = '15'` in its `beforeAll`
        # and flushes the `rl:*` key prefix between cases, so
        # this run is hermetic.
        run: npm test

  # Parallel `build` job. Runs `npm run build` -> `tsc` (per
  # package.json), which emits JS to `backend/dist/`. The 3
  # pre-existing tsc errors in `config/redis.ts` (2) and
  # `services/socketService.ts` (1) that previously blocked this
  # job are now fixed, so a clean `tsc` is the new floor: any
  # future tsc regression fails this job before it can land.
  # Runs in parallel with `test` — no `needs:` clause — so the
  # test job's own ts-jest type-check and the build job's `tsc`
  # can race each other rather than serialising.
  build:
    name: tsc build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Same as the test job: `npm ci` for reproducibility and
        # dependency-drift detection.
        run: npm ci

      - name: Type-check + emit
        # Canonical "tsc must pass" check. Emits `dist/` for the
        # backend. The test job's ts-jest is ALSO a type-check,
        # but the build job is the clearer signal in the GitHub
        # UI for future regressions and matches what a deploy
        # would do (`npm run build` is the same script).
        run: npm run build

  # Parallel `lint` job. Runs `npm run lint` -> `eslint src/**/*.ts`
  # (per package.json). The config (backend/.eslintrc.json) extends
  # @typescript-eslint/recommended + eslint:recommended with
  # no-explicit-any + no-unused-vars disabled, so the baseline
  # passes today; new violations of the remaining strict rules
  # (no-undef, no-console, no-var, prefer-const, ...) will fail
  # this job. Runs in parallel with `test` and `build` -- no
  # `needs:` clause.
  lint:
    name: eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # `npm ci` for reproducibility and dependency-drift
        # detection (matches the other two jobs).
        run: npm ci

      - name: Lint
        # `npm run lint` -> `eslint src/**/*.ts` (per
        # package.json). Uses the config at
        # backend/.eslintrc.json (extends recommended; permissive
        # on no-explicit-any + no-unused-vars so the baseline is
        # clean). Fails the job on any remaining-rule violation,
        # so regressions in the strict subset (no-undef,
        # no-console, no-var, prefer-const, ...) are caught at
        # CI time.
        run: npm run lint

  # Parallel `lint-frontend` job. Mirrors the backend lint job
  # but with `working-directory: frontend`. Runs
  # `npm run lint` -> `eslint . --ext ts,tsx ...` (per
  # frontend/package.json). Uses the config at
  # frontend/.eslintrc.json (extends recommended + react-hooks;
  # permissive on no-explicit-any + no-unused-vars so the
  # baseline is clean).
  lint-frontend:
    name: eslint (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # `npm ci` for reproducibility and dependency-drift
        # detection (matches the other jobs). Requires
        # frontend/package-lock.json to exist (generated via
        # `npm install --package-lock-only`).
        run: npm ci

      - name: Lint
        # `npm run lint` -> `eslint . --ext ts,tsx
        # --report-unused-disable-directives --max-warnings 0`
        # (per frontend/package.json). Fails the job on any
        # violation, so frontend regressions in the strict subset
        # (no-undef, no-console, no-var, prefer-const, ...) are
        # caught at CI time.
        run: npm run lint

  # Parallel `lint-zk-proofs` job. Mirrors the backend lint job
  # but with `working-directory: zk-proofs`. Runs
  # `npm run lint` -> `eslint src/**/*.ts` (per
  # zk-proofs/package.json). Uses the config at
  # zk-proofs/.eslintrc.json (mirrors backend's config exactly
  # so the lint baseline is consistent across the monorepo).
  lint-zk-proofs:
    name: eslint (zk-proofs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zk-proofs
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # `npm ci` for reproducibility and dependency-drift
        # detection. Requires zk-proofs/package-lock.json to
        # exist (generated via
        # `npm install --package-lock-only`).
        run: npm ci

      - name: Lint
        # `npm run lint` -> `eslint src/**/*.ts` (per
        # zk-proofs/package.json). Mirrors the backend lint
        # job so the lint baseline is consistent across the
        # monorepo.
        run: npm run lint
